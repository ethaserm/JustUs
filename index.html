<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>JustUs</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #0a0a0a; color: #f0f0f0;
  height: 100dvh; display: flex; overflow: hidden;
}

/* AUTH */
#auth-screen {
  position: fixed; inset: 0; background: #0a0a0a;
  display: flex; align-items: center; justify-content: center;
  z-index: 200; flex-direction: column;
}
.auth-box {
  background: #111; border: 1px solid #222; border-radius: 16px;
  padding: 32px 28px; width: 320px; display: flex; flex-direction: column; gap: 14px;
}
.auth-box h1 { font-size: 22px; font-weight: 700; text-align: center; }
.auth-box p { font-size: 13px; color: #666; text-align: center; margin-top: -6px; }
.auth-tabs { display: flex; background: #0a0a0a; border-radius: 8px; padding: 3px; }
.auth-tab {
  flex: 1; padding: 7px; text-align: center; font-size: 13px; font-weight: 600;
  border-radius: 6px; cursor: pointer; color: #666; transition: all 0.2s; border: none; background: none;
}
.auth-tab.active { background: #dc143c; color: #fff; }
.auth-input {
  background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 10px;
  color: #f0f0f0; font-size: 14px; padding: 11px 14px; outline: none;
  transition: border-color 0.2s; width: 100%;
}
.auth-input:focus { border-color: #dc143c; }
.auth-btn {
  background: #dc143c; color: #fff; border: none; border-radius: 10px;
  font-size: 15px; font-weight: 600; padding: 12px; cursor: pointer; transition: background 0.2s;
}
.auth-btn:hover { background: #a50e2d; }
.auth-error { font-size: 12px; color: #dc143c; text-align: center; min-height: 16px; }

/* LAYOUT */
#app { display: none; width: 100%; height: 100dvh; }

/* SIDEBAR */
#sidebar {
  width: 240px; min-width: 240px; background: #111;
  border-right: 1px solid #1e1e1e; display: flex;
  flex-direction: column; height: 100dvh; overflow: hidden;
}
.sidebar-header {
  padding: 14px 14px 10px; border-bottom: 1px solid #1e1e1e;
  display: flex; align-items: center; gap: 8px;
}
.sidebar-header h2 { font-size: 16px; font-weight: 700; flex: 1; }
.new-chat-btn {
  width: 26px; height: 26px; background: #dc143c; border: none; border-radius: 6px;
  color: #fff; font-size: 18px; cursor: pointer; display: flex;
  align-items: center; justify-content: center; transition: background 0.2s; flex-shrink: 0;
  line-height: 1;
}
.new-chat-btn:hover { background: #a50e2d; }

.sidebar-scroll { flex: 1; overflow-y: auto; }
.sidebar-scroll::-webkit-scrollbar { width: 3px; }
.sidebar-scroll::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 4px; }

.sidebar-section {
  padding: 10px 14px 4px; font-size: 11px; font-weight: 700;
  color: #444; text-transform: uppercase; letter-spacing: 0.08em;
}
.room-item {
  display: flex; align-items: center; gap: 8px; padding: 8px 14px;
  cursor: pointer; transition: background 0.15s; font-size: 14px; color: #888;
}
.room-item:hover { background: #1a1a1a; color: #f0f0f0; }
.room-item.active { background: #1e0508; color: #f0f0f0; border-right: 2px solid #dc143c; }
.room-icon { font-size: 15px; flex-shrink: 0; }
.room-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.unread {
  background: #dc143c; color: #fff; font-size: 10px; font-weight: 700;
  padding: 1px 6px; border-radius: 10px; min-width: 18px; text-align: center;
}

/* ONLINE */
.online-section { border-top: 1px solid #1e1e1e; padding: 8px 0; flex-shrink: 0; }
.online-item { display: flex; align-items: center; gap: 8px; padding: 5px 14px; font-size: 13px; color: #888; }
.online-dot { width: 7px; height: 7px; border-radius: 50%; background: #22c55e; flex-shrink: 0; }
.online-you { font-size: 11px; color: #444; }

/* USER BAR */
.user-bar {
  border-top: 1px solid #1e1e1e; padding: 10px 14px;
  display: flex; align-items: center; gap: 8px; flex-shrink: 0;
}
.user-avatar {
  width: 30px; height: 30px; border-radius: 50%; background: #dc143c;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; color: #fff; flex-shrink: 0;
}
.user-bar-name { flex: 1; font-size: 13px; font-weight: 600; }
.logout-btn { background: none; border: none; color: #555; cursor: pointer; font-size: 16px; transition: color 0.2s; }
.logout-btn:hover { color: #dc143c; }

/* MAIN */
#main { flex: 1; display: flex; flex-direction: column; height: 100dvh; overflow: hidden; }
#chat-header {
  padding: 14px 18px; border-bottom: 1px solid #1e1e1e;
  display: flex; align-items: center; gap: 10px; background: #111; flex-shrink: 0;
}
#chat-header .room-icon-big { font-size: 18px; }
#chat-header h2 { font-size: 15px; font-weight: 700; flex: 1; }
#chat-header .member-count { font-size: 12px; color: #555; }

/* WELCOME SCREEN */
#welcome {
  flex: 1; display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 12px; color: #333;
}
#welcome h3 { font-size: 18px; color: #555; }
#welcome p { font-size: 13px; color: #333; }

/* MESSAGES */
#messages {
  flex: 1; overflow-y: auto; padding: 16px;
  display: flex; flex-direction: column; gap: 6px; scroll-behavior: smooth;
}
#messages::-webkit-scrollbar { width: 4px; }
#messages::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 4px; }
.msg-wrapper { display: flex; flex-direction: column; max-width: 68%; gap: 2px; animation: msgIn 0.15s ease-out; }
@keyframes msgIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
.msg-wrapper.me { align-self: flex-end; align-items: flex-end; }
.msg-wrapper.them { align-self: flex-start; align-items: flex-start; }
.sender-name { font-size: 11px; color: #555; padding: 0 4px; }
.bubble { padding: 10px 14px; border-radius: 18px; font-size: 14px; line-height: 1.45; word-break: break-word; }
.me .bubble { background: #dc143c; color: #fff; border-bottom-right-radius: 4px; }
.them .bubble { background: #1a1a1a; color: #f0f0f0; border: 1px solid #252525; border-bottom-left-radius: 4px; }
.timestamp { font-size: 10px; color: #444; padding: 0 4px; }
.system-msg {
  align-self: center; font-size: 11px; color: #444;
  background: #141414; border: 1px solid #1e1e1e;
  padding: 3px 12px; border-radius: 20px; margin: 4px 0;
}

#typing-indicator { padding: 0 18px 4px; font-size: 12px; color: #555; min-height: 18px; flex-shrink: 0; }

/* INPUT BAR */
#input-bar {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 12px; background: #111; border-top: 1px solid #1e1e1e; flex-shrink: 0;
}
#emoji-btn { background: none; border: none; font-size: 20px; cursor: pointer; padding: 4px; flex-shrink: 0; }
#msg-input {
  flex: 1; background: #1a1a1a; border: 1px solid #252525; border-radius: 22px;
  color: #f0f0f0; font-size: 14px; padding: 10px 16px; outline: none;
  resize: none; max-height: 120px; line-height: 1.4; font-family: inherit; transition: border-color 0.2s;
}
#msg-input:focus { border-color: #dc143c; }
#send-btn {
  width: 38px; height: 38px; background: #dc143c; border: none; border-radius: 50%;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: background 0.2s, transform 0.1s;
}
#send-btn:hover { background: #a50e2d; }
#send-btn:active { transform: scale(0.92); }
#send-btn svg { width: 16px; height: 16px; fill: #fff; }

/* EMOJI PICKER */
#emoji-picker {
  position: fixed; bottom: 62px; left: 248px;
  background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 14px;
  padding: 10px; display: none; flex-wrap: wrap; gap: 4px; width: 230px; z-index: 50;
}
#emoji-picker.open { display: flex; }
.e-btn { font-size: 20px; background: none; border: none; cursor: pointer; padding: 4px; border-radius: 6px; transition: background 0.1s; }
.e-btn:hover { background: #2a2a2a; }

/* NOTIFICATION */
#notif {
  position: fixed; top: 16px; right: 16px; background: #1a1a1a;
  border: 1px solid #2a2a2a; border-radius: 12px; padding: 10px 14px;
  font-size: 13px; display: none; z-index: 300; max-width: 260px;
  animation: notifIn 0.2s ease-out;
}
@keyframes notifIn { from { opacity:0; transform:translateX(20px); } to { opacity:1; transform:translateX(0); } }
#notif strong { color: #dc143c; display: block; font-size: 11px; margin-bottom: 2px; }

/* NEW DM MODAL */
#dm-modal {
  position: fixed; inset: 0; background: rgba(0,0,0,0.7);
  display: none; align-items: center; justify-content: center; z-index: 250;
}
#dm-modal.open { display: flex; }
.dm-box {
  background: #111; border: 1px solid #222; border-radius: 16px;
  padding: 24px; width: 340px; display: flex; flex-direction: column; gap: 14px;
}
.dm-box h3 { font-size: 16px; font-weight: 700; }
.dm-box p { font-size: 13px; color: #666; margin-top: -6px; }
.dm-search {
  background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 10px;
  color: #f0f0f0; font-size: 14px; padding: 10px 14px; outline: none;
  transition: border-color 0.2s; width: 100%;
}
.dm-search:focus { border-color: #dc143c; }
#user-list { display: flex; flex-direction: column; gap: 4px; max-height: 220px; overflow-y: auto; }
.user-select-item {
  display: flex; align-items: center; gap: 10px; padding: 9px 12px;
  border-radius: 10px; cursor: pointer; transition: background 0.15s;
}
.user-select-item:hover { background: #1a1a1a; }
.user-select-item.selected { background: #1e0508; }
.user-sel-avatar {
  width: 32px; height: 32px; border-radius: 50%; background: #2a2a2a;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; color: #f0f0f0; flex-shrink: 0;
}
.user-sel-name { flex: 1; font-size: 14px; }
.user-sel-check { width: 18px; height: 18px; border-radius: 50%; border: 2px solid #333; flex-shrink: 0; transition: all 0.15s; }
.user-select-item.selected .user-sel-check { background: #dc143c; border-color: #dc143c; }
.dm-actions { display: flex; gap: 8px; }
.dm-cancel { flex: 1; background: #1a1a1a; border: 1px solid #2a2a2a; color: #888; border-radius: 10px; padding: 11px; cursor: pointer; font-size: 14px; transition: background 0.2s; }
.dm-cancel:hover { background: #222; }
.dm-start { flex: 2; background: #dc143c; border: none; color: #fff; border-radius: 10px; padding: 11px; cursor: pointer; font-size: 14px; font-weight: 600; transition: background 0.2s; }
.dm-start:hover { background: #a50e2d; }
.dm-start:disabled { background: #3a0a14; color: #666; cursor: not-allowed; }
.online-badge { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; flex-shrink: 0; }
.offline-badge { width: 8px; height: 8px; border-radius: 50%; background: #333; flex-shrink: 0; }
</style>
</head>

<script>

const ROOMS = [

  { id: "gaming", name: "Gaming", icon: "🎮" },
  { id: "random", name: "Random", icon: "🎲" },

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue, set, remove, onDisconnect, get }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

let db, myUsername, currentChatId = null, currentChatType = null;
let typingTimeout = null, notifTimeout = null, notifSound;
let unreadCounts = {}, activeListeners = [];
let allUsers = {}, onlineUsers = {}, selectedDmUsers = new Set();
let myDms = {};

// ---- AUTH ----
window.switchTab = (tab) => {
  document.getElementById("tab-login").classList.toggle("active", tab === "login");
  document.getElementById("tab-register").classList.toggle("active", tab === "register");
  document.getElementById("auth-error").textContent = "";
  document.querySelector(".auth-btn").textContent = tab === "login" ? "Login" : "Register";
};

window.handleAuth = async () => {
  const user = document.getElementById("auth-user").value.trim().toLowerCase().replace(/\s+/g,"");
  const pass = document.getElementById("auth-pass").value;
  const isLogin = document.getElementById("tab-login").classList.contains("active");
  const errEl = document.getElementById("auth-error");
  if (!user || !pass) { errEl.textContent = "Fill in both fields."; return; }
  if (user.length < 2) { errEl.textContent = "Username too short."; return; }
  if (pass.length < 4) { errEl.textContent = "Password too short (min 4)."; return; }

  const app = initializeApp(FIREBASE_CONFIG);
  db = getDatabase(app);
  const userRef = ref(db, `users/${user}`);
  const snap = await get(userRef);

  if (isLogin) {
    if (!snap.exists()) { errEl.textContent = "User not found."; return; }
    if (snap.val().password !== btoa(pass)) { errEl.textContent = "Wrong password."; return; }
  } else {
    if (snap.exists()) { errEl.textContent = "Username taken."; return; }
    await set(userRef, { password: btoa(pass), joined: Date.now() });
  }
  myUsername = user;
  startApp();
};

document.getElementById("auth-pass").addEventListener("keydown", e => { if (e.key === "Enter") window.handleAuth(); });
document.getElementById("auth-user").addEventListener("keydown", e => { if (e.key === "Enter") window.handleAuth(); });

// ---- APP START ----
function startApp() {
  document.getElementById("auth-screen").style.display = "none";
  document.getElementById("app").style.display = "flex";
  document.getElementById("user-bar-name").textContent = myUsername;
  document.getElementById("user-avatar").textContent = myUsername[0].toUpperCase();
  initSound();
  if (Notification.permission === "default") Notification.requestPermission();

  // Online presence
  const myOnlineRef = ref(db, `online/${myUsername}`);
  set(myOnlineRef, { name: myUsername, ts: Date.now() });
  onDisconnect(myOnlineRef).remove();

  onValue(ref(db, "online"), snap => {
    onlineUsers = snap.val() || {};
    renderOnlineList();
  });

  // Watch all users
  onValue(ref(db, "users"), snap => {
    allUsers = snap.val() || {};
  });

  // Watch DMs that involve me
  onValue(ref(db, "dms"), snap => {
    const all = snap.val() || {};
    myDms = {};
    Object.entries(all).forEach(([id, dm]) => {
      if (dm.members && dm.members[myUsername]) myDms[id] = dm;
    });
    renderDmList();
  });

  buildRoomList();
  buildEmojiPicker();
}

window.logout = () => {
  if (myUsername) remove(ref(db, `online/${myUsername}`));
  location.reload();
};

// ---- ONLINE LIST ----
function renderOnlineList() {
  const list = document.getElementById("online-list");
  list.innerHTML = "";
  const users = Object.values(onlineUsers);
  document.getElementById("online-count-label").textContent = users.length;
  users.forEach(u => {
    const el = document.createElement("div");
    el.className = "online-item";
    el.innerHTML = `<div class="online-dot"></div><div class="online-name">${u.name}</div>${u.name === myUsername ? '<span class="online-you">you</span>' : ''}`;
    list.appendChild(el);
  });
}

// ---- ROOMS ----
function buildRoomList() {
  const list = document.getElementById("room-list");
  list.innerHTML = "";
  ROOMS.forEach(r => {
    const el = document.createElement("div");
    el.className = "room-item";
    el.id = `room-${r.id}`;
    el.innerHTML = `<span class="room-icon">${r.icon}</span><span class="room-name">${r.name}</span>`;
    const badge = document.createElement("span");
    badge.className = "unread"; badge.id = `unread-room-${r.id}`; badge.style.display = "none";
    el.appendChild(badge);
    el.addEventListener("click", () => openRoom(r.id));
    list.appendChild(el);
  });
}

function openRoom(roomId) {
  const room = ROOMS.find(r => r.id === roomId);
  setActiveChat(`room-${roomId}`, room.icon, room.name, "room", roomId);
  clearUnread(`unread-room-${roomId}`);
  loadMessages(`rooms/${roomId}`, `rooms/${roomId}`);
}

// ---- DM LIST ----
function renderDmList() {
  const list = document.getElementById("dm-list");
  const label = document.getElementById("dm-section-label");
  list.innerHTML = "";
  const entries = Object.entries(myDms);
  label.style.display = entries.length ? "block" : "none";
  entries.forEach(([id, dm]) => {
    const otherMembers = Object.keys(dm.members).filter(m => m !== myUsername);
    const name = otherMembers.length === 1 ? otherMembers[0] : otherMembers.join(", ");
    const isOnline = otherMembers.some(m => onlineUsers[m]);
    const el = document.createElement("div");
    el.className = "room-item";
    el.id = `dm-${id}`;
    const avatar = name[0].toUpperCase();
    el.innerHTML = `
      <div class="user-sel-avatar" style="width:22px;height:22px;font-size:10px;background:#2a2a2a">${avatar}</div>
      <span class="room-name">${name}</span>
      <span class="${isOnline ? 'online-badge' : 'offline-badge'}"></span>`;
    const badge = document.createElement("span");
    badge.className = "unread"; badge.id = `unread-dm-${id}`; badge.style.display = "none";
    el.appendChild(badge);
    el.addEventListener("click", () => openDm(id, name));
    list.appendChild(el);
  });
}

function openDm(dmId, name) {
  setActiveChat(`dm-${dmId}`, "👤", name, "dm", dmId);
  clearUnread(`unread-dm-${dmId}`);
  loadMessages(`dms/${dmId}/messages`, `dms/${dmId}/messages`);
}

// ---- CHAT CORE ----
function setActiveChat(elId, icon, name, type, id) {
  currentChatId = id; currentChatType = type;
  document.querySelectorAll(".room-item").forEach(el => el.classList.remove("active"));
  const el = document.getElementById(elId);
  if (el) el.classList.add("active");
  document.getElementById("header-icon").textContent = icon;
  document.getElementById("header-name").textContent = type === "room" ? `#${name}` : name;
  document.getElementById("chat-header").style.display = "flex";
  document.getElementById("welcome").style.display = "none";
  document.getElementById("messages").style.display = "flex";
  document.getElementById("typing-indicator").style.display = "block";
  document.getElementById("input-bar").style.display = "flex";
}

function clearUnread(badgeId) {
  const b = document.getElementById(badgeId);
  if (b) b.style.display = "none";
}

let currentMsgUnsub = null;
function loadMessages(msgPath, typingBasePath) {
  document.getElementById("messages").innerHTML = "";
  if (currentMsgUnsub) currentMsgUnsub();

  let loaded = false;
  const msgsRef = ref(db, msgPath);
  currentMsgUnsub = onValue(msgsRef, snap => {
    const val = snap.val() || {};
    if (!loaded) {
      Object.entries(val).forEach(([id, msg]) => renderMsg(id, msg));
      loaded = true;
    } else {
      Object.entries(val).forEach(([id, msg]) => {
        if (!document.querySelector(`[data-id="${id}"]`)) {
          renderMsg(id, msg);
          if (msg.name !== myUsername) {
            const label = document.getElementById("header-name").textContent;
            showNotif(msg.name, msg.text, label);
          }
        }
      });
    }
  });

  // Typing
  const typingRef = ref(db, `typing/${currentChatType}_${currentChatId}`);
  onValue(typingRef, snap => {
    const val = snap.val() || {};
    const others = Object.keys(val).filter(n => n !== myUsername);
    document.getElementById("typing-indicator").textContent =
      others.length ? `${others.join(", ")} ${others.length === 1 ? "is" : "are"} typing…` : "";
  });
}

function renderMsg(id, msg) {
  const container = document.getElementById("messages");
  if (msg.system) {
    const el = document.createElement("div");
    el.className = "system-msg"; el.dataset.id = id; el.textContent = msg.text;
    container.appendChild(el); container.scrollTop = container.scrollHeight; return;
  }
  const isMe = msg.name === myUsername;
  const wrapper = document.createElement("div");
  wrapper.className = `msg-wrapper ${isMe ? "me" : "them"}`;
  wrapper.dataset.id = id;
  const ts = new Date(msg.timestamp).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
  if (!isMe) wrapper.innerHTML += `<div class="sender-name">${msg.name}</div>`;
  wrapper.innerHTML += `<div class="bubble">${msg.text.replace(/</g,"&lt;")}</div><div class="timestamp">${ts}</div>`;
  container.appendChild(wrapper);
  container.scrollTop = container.scrollHeight;
}

function getMsgPath() {
  return currentChatType === "room" ? `rooms/${currentChatId}` : `dms/${currentChatId}/messages`;
}

function sendMessage() {
  const input = document.getElementById("msg-input");
  const text = input.value.trim();
  if (!text || !myUsername || !currentChatId) return;
  push(ref(db, getMsgPath()), { name: myUsername, text, timestamp: Date.now() });
  input.value = ""; input.style.height = "auto";
  clearTyping();
}

function clearTyping() {
  clearTimeout(typingTimeout);
  if (currentChatId) remove(ref(db, `typing/${currentChatType}_${currentChatId}/${myUsername}`));
}

document.getElementById("msg-input").addEventListener("input", function() {
  this.style.height = "auto";
  this.style.height = Math.min(this.scrollHeight, 120) + "px";
  if (currentChatId) set(ref(db, `typing/${currentChatType}_${currentChatId}/${myUsername}`), true);
  clearTimeout(typingTimeout);
  typingTimeout = setTimeout(clearTyping, 2000);
});
document.getElementById("msg-input").addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
document.getElementById("send-btn").addEventListener("click", sendMessage);

// ---- DM MODAL ----
window.openDmModal = () => {
  selectedDmUsers.clear();
  document.getElementById("dm-search").value = "";
  renderUserList("");
  document.getElementById("dm-modal").classList.add("open");
};
window.closeDmModal = () => document.getElementById("dm-modal").classList.remove("open");

function renderUserList(filter) {
  const list = document.getElementById("user-list");
  list.innerHTML = "";
  const users = Object.keys(allUsers).filter(u => u !== myUsername && u.includes(filter.toLowerCase()));
  if (!users.length) {
    list.innerHTML = `<div style="font-size:13px;color:#444;text-align:center;padding:16px">No users found</div>`;
    return;
  }
  users.forEach(u => {
    const isOnline = !!onlineUsers[u];
    const el = document.createElement("div");
    el.className = "user-select-item" + (selectedDmUsers.has(u) ? " selected" : "");
    el.innerHTML = `
      <div class="user-sel-avatar">${u[0].toUpperCase()}</div>
      <div class="user-sel-name">${u}</div>
      <div class="${isOnline ? 'online-badge' : 'offline-badge'}" style="margin-right:6px"></div>
      <div class="user-sel-check"></div>`;
    el.addEventListener("click", () => {
      if (selectedDmUsers.has(u)) selectedDmUsers.delete(u);
      else selectedDmUsers.add(u);
      renderUserList(document.getElementById("dm-search").value);
      document.getElementById("dm-start-btn").disabled = selectedDmUsers.size === 0;
    });
    list.appendChild(el);
  });
}

window.filterUsers = (val) => renderUserList(val);

window.startDm = async () => {
  if (!selectedDmUsers.size) return;
  const members = [myUsername, ...Array.from(selectedDmUsers)];
  // Check if DM with exact same members already exists
  const existingId = Object.entries(myDms).find(([id, dm]) => {
    const existing = Object.keys(dm.members).sort().join(",");
    const wanted = members.slice().sort().join(",");
    return existing === wanted;
  })?.[0];

  if (existingId) {
    closeDmModal();
    const name = members.filter(m => m !== myUsername).join(", ");
    openDm(existingId, name);
    return;
  }

  const dmRef = ref(db, "dms");
  const newDm = await push(dmRef, {
    members: Object.fromEntries(members.map(m => [m, true])),
    created: Date.now()
  });
  closeDmModal();
  const name = members.filter(m => m !== myUsername).join(", ");
  openDm(newDm.key, name);
};

// ---- EMOJI ----
function buildEmojiPicker() {
  const picker = document.getElementById("emoji-picker");
  EMOJIS.forEach(em => {
    const btn = document.createElement("button");
    btn.className = "e-btn"; btn.textContent = em;
    btn.addEventListener("click", () => {
      document.getElementById("msg-input").value += em;
      document.getElementById("msg-input").focus();
      picker.classList.remove("open");
    });
    picker.appendChild(btn);
  });
  document.getElementById("emoji-btn").addEventListener("click", e => {
    e.stopPropagation(); picker.classList.toggle("open");
  });
  document.addEventListener("click", () => picker.classList.remove("open"));
}

// ---- SOUND & NOTIF ----
function initSound() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  notifSound = () => {
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.setValueAtTime(880, ctx.currentTime);
    o.frequency.exponentialRampToValueAtTime(660, ctx.currentTime + 0.08);
    g.gain.setValueAtTime(0.15, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.25);
    o.start(); o.stop(ctx.currentTime + 0.25);
  };
}

function showNotif(name, text, chatName) {
  notifSound?.();
  const el = document.getElementById("notif");
  el.innerHTML = `<strong>${name} · ${chatName}</strong>${text.length > 60 ? text.slice(0,60)+"…" : text}`;
  el.style.display = "block";
  clearTimeout(notifTimeout);
  notifTimeout = setTimeout(() => el.style.display = "none", 3500);
  if (Notification.permission === "granted" && !document.hasFocus()) {
    new Notification(`${name} · ${chatName}`, { body: text, silent: true });
  }
}
